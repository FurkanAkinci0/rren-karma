<!DOCTYPE HTML>
<html lang="tr">
	<head>
		<title>Arşiv - RReN Karma</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
		<style>
			body { background: radial-gradient(circle at center, #1e1e1e 0%, #0f0f0f 100%) !important; background-attachment: fixed !important; padding-top: 110px !important; margin: 0 !important; }
			#top-navbar { position: fixed !important; top: 15px !important; left: 2% !important; right: 2% !important; height: 65px !important; background: #151515 !important; border: 2px solid #505050 !important; border-radius: 50px !important; display: flex !important; align-items: center !important; justify-content: space-between !important; padding: 0 30px !important; z-index: 999999 !important; }
			.nav-left img { height: 45px; border-radius: 50%; }
			.nav-center { display: flex; gap: 30px; }
			.nav-center a { color: #505050 !important; text-decoration: none !important; font-weight: bold; font-size: 0.9em !important; transition: color 0.3s; }
			.nav-center a:hover, .nav-center a.active { color: #ffffff !important; }
			.nav-right { display: flex; gap: 20px; align-items: center; }
			.nav-right a { color: #505050 !important; font-size: 1.3em; transition: color 0.3s; text-decoration: none !important; }
			
			#main { padding: 2em; width: 100% !important; }
			.video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5em; }
			.video-card { position: relative; border-radius: 12px; overflow: hidden; border: 1.5px solid #505050; display: block; line-height: 0; transition: transform 0.3s; }
			.video-card:hover { transform: scale(1.03); border-color: #ffff00; }
			.thumbnail-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
			.thumbnail-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: opacity 0.3s; }
			.video-card:hover img { opacity: 1; }
			.archive-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #fff; padding: 5px 10px; border-radius: 5px; font-size: 0.8em; font-weight: bold; }
		</style>
	</head>
	<body>
		<nav id="top-navbar">
			<div class="nav-left"><img src="images/avatar.png" alt="Logo"></div>
			<div class="nav-center">
				<a href="index.html">Anasayfa</a>
				<a href="videolar.html">Videolar</a>
				<a href="tepki_videolari.html">Tepki Videoları</a>
				<a href="arsiv.html" class="active">Arşiv</a>
				<a href="gonder.html">Video Gönder</a>
			</div>
			<div class="nav-right">
				<a href="https://youtube.com" target="_blank" class="fa-brands fa-youtube"></a>
				<a href="https://instagram.com/rrenkarma" target="_blank" class="fa-brands fa-instagram"></a>
				<a href="https://x.com" target="_blank" class="fa-brands fa-x-twitter"></a>
			</div>
		</nav>

		<div id="main">
			<div id="arsiv-container" class="video-grid"></div>
		</div>

		<script>
    // Arşiv videolarını buraya ekliyorsun
    const arsivListesi = 
		[
        { "id": "_vKV8j5nFko", "baslik": "Arşiv #1" },
        { "id": "l2aHlwW_fqQ", "baslik": "Arşiv #2" },
		{ "id": "_vKV8j5nFko", "baslik": "Arşiv #3" }
		];

    const container = document.getElementById('arsiv-container');

    function arsivGoster() {
        container.innerHTML = ''; 
        arsivListesi.forEach((video, index) => {
            const sayfaNo = index + 1;
            // DİKKAT: Linkin başına 'arsiv/' ekledik
            container.innerHTML += `
                <a href="arsiv/arsiv_${sayfaNo}.html" class="video-card">
                    <div class="thumbnail-container">
                        <img src="https://img.youtube.com/vi/${video.id}/maxresdefault.jpg" alt="${video.baslik}">
                        <div class="archive-label">${video.baslik}</div>
                    </div>
                </a>`;
        });
		}
		window.onload = arsivGoster;
		</script>
	</body>
</html>
