<!DOCTYPE HTML>
<html lang="tr">
	<head>
		<title>Videolar - RReN Karma</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
		<style>
			body { background: radial-gradient(circle at center, #1e1e1e 0%, #0f0f0f 100%) !important; background-attachment: fixed !important; padding-top: 110px !important; margin: 0 !important; }
			
			/* ÜST BAR */
			#top-navbar {
				position: fixed !important; top: 15px !important; left: 2% !important; right: 2% !important;
				height: 65px !important; background: #151515 !important; border: 2px solid #505050 !important;
				border-radius: 50px !important; display: flex !important; align-items: center !important;
				justify-content: space-between !important; padding: 0 30px !important; z-index: 999999 !important;
			}
			.nav-left img { height: 45px; border-radius: 50%; }
			.nav-center { display: flex; gap: 30px; }
			.nav-center a { color: #505050 !important; text-decoration: none !important; font-weight: bold; font-size: 0.9em !important; transition: color 0.3s; }
			.nav-center a:hover, .nav-center a.active { color: #ffffff !important; }

			.nav-right { display: flex; gap: 20px; align-items: center; }
			.nav-right a { color: #505050 !important; font-size: 1.3em; transition: color 0.3s; text-decoration: none !important; }
			.nav-right a.fa-youtube:hover { color: #ff0000 !important; }
			.nav-right a.fa-instagram:hover { color: #ffffff !important; }
			.nav-right a.fa-x-twitter:hover { color: #202020 !important; }

			/* SIRALAMA MENÜSÜ */
			.sort-container { text-align: right; margin-bottom: 20px; padding-right: 2%; }
			#sortOrder { background: #151515; color: #fff; border: 1px solid #505050; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 0.8em; }

			/* VİDEO IZGARASI */
			#main { margin-left: 0 !important; padding: 2em; width: 100% !important; }
			.video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5em; }
			.video-card { position: relative; border-radius: 12px; overflow: hidden; border: 1.5px solid #505050; display: block; line-height: 0; transition: transform 0.3s; }
			.video-card:hover { transform: scale(1.03); }
			.thumbnail-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
			.thumbnail-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; display: block; transition: opacity 0.3s; }
			.video-card:hover .thumbnail-container img { opacity: 1; }
			.play-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
			.play-icon { width: 60px; height: 60px; background: rgba(0, 0, 0, 0.6); border: 2px solid #505050; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.5rem; }

			#header, .navPanelToggle { display: none !important; }
		</style>
	</head>
	<body>
		<nav id="top-navbar">
			<div class="nav-left"><img src="images/avatar.png" alt="Logo"></div>
			<div class="nav-center">
				<a href="index.html">Anasayfa</a>
				<a href="videolar.html" class="active">Videolar</a>
				<a href="#">Video İçerikleri</a>
				<a href="gonder.html">Video Gönder</a>
			</div>
			<div class="nav-right">
				<a href="https://youtube.com" target="_blank" class="fa-brands fa-youtube"></a>
				<a href="https://instagram.com/rrenkarma" target="_blank" class="fa-brands fa-instagram"></a>
				<a href="https://x.com" target="_blank" class="fa-brands fa-x-twitter"></a>
			</div>
		</nav>

		<div id="main">
			<div class="sort-container">
				<label for="sortOrder" style="color: #505050; margin-right: 10px;">Sıralama:</label>
				<select id="sortOrder">
					<option value="yeni">En Yeni</option>
					<option value="eski">En Eski</option>
				</select>
			</div>
			
			<div id="video-container" class="video-grid"></div>
		</div>

		<script>
    // JSON'dan çekmek yerine veriyi direkt buraya gömüyoruz
    const orijinalListe = [
        { "id": "_vKV8j5nFko", "baslik": "RReN Karma #1" },
        { "id": "i6GrHv0MhpU", "baslik": "RReN Karma #2" },
        { "id": "MGPSR6gcCrA", "baslik": "RReN Karma #3" }
    ];

    const container = document.getElementById('video-container');
    const sortSelect = document.getElementById('sortOrder');

    function videolariGoster(liste) {
        container.innerHTML = ''; 
        liste.forEach(video => {
            container.innerHTML += `
                <a href="https://www.youtube.com/watch?v=${video.id}" target="_blank" class="video-card">
                    <div class="thumbnail-container">
                        <img src="https://img.youtube.com/vi/${video.id}/maxresdefault.jpg" alt="${video.baslik}">
                        <div class="play-overlay">
                            <div class="play-icon"><i class="fa-solid fa-play"></i></div>
                        </div>
                    </div>
                </a>`;
        });
    }

    // İlk yüklemede göster
    function baslat() {
        let gosterilecek = [...orijinalListe];
        gosterilecek.reverse(); // En yeni en başta
        videolariGoster(gosterilecek);
    }

    sortSelect.addEventListener('change', (e) => {
        let liste = [...orijinalListe];
        if (e.target.value === 'yeni') liste.reverse();
        videolariGoster(liste);
    });

    baslat();
	</script>
	</body>

</html>
